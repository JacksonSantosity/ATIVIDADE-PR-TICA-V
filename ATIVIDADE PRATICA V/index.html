<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rede Social</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <style>
        .logo {
            display: block;
            margin: 0 auto 20px auto;
            width: 150px; /* ajuste o tamanho conforme desejar */
        }

        article {
            text-align: center;
        }

        form {
            text-align: left;
        }
    </style>
</head>
<body>

<main class="container">
    <article>

     
        <img src="C:\Users\RJ INFORMATICA 02\Desktop\laura\img"  class="logo">

        <h1>Entrar</h1>

        <form action="feed.html">
            <label for="email">
                E-mail
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Digite seu e-mail"
                    required>
            </label>

            <label for="senha">
                Senha
                <input
                    type="password"
                    id="senha"
                    name="senha"
                    placeholder="Digite sua senha"
                    required>
            </label>

            <button type="submit">Entrar</button>
        </form>

        <p>
            <a href="cadastro.html">Criar novo usuário</a>
        </p>

        <p>
            <a href="#">Esqueceu sua senha?</a>
        </p>
    </article>
</main>

</body>
</html>
