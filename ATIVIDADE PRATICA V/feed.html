
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed - Rede Social</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <style>
        .usuario {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .acoes {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        nav {
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

<main class="container">


    <nav>
        <ul>
            <li><strong>single.com</strong></li>
        </ul>

        <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Buscar</a></li>
            <li><a href="#">Perfil</a></li>
            <li><a href="index.html">Sair</a></li>
        </ul>
    </nav>

    
    <article>
        <h2>Novo Post</h2>

        <div class="usuario">
            <img
                class="avatar"
                src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQHCZuslFbn42wwA9qw6ywBERhtpr_yOFy3Cw&s"
                alt="Avatar">

            <div>
                <strong>Jackson Santos</strong><br>
                <small>@jacksonity</small>
            </div>
        </div>

        <textarea
            rows="5"
            placeholder="O que está acontecendo?"></textarea>

        <button>Publicar</button>
    </article>

   
    <h2>Posts Criados</h2>

    <article>

        <div class="usuario">
            <img
                class="avatar"
                src="https://imgcdn.stablediffusionweb.com/2024/3/24/3b153c48-649f-4ee2-b1cc-3d45333db028.jpg"
                alt="Avatar">

            <div>
                <strong>Roberto Carlos</strong><br>
                <small>@robertoclos</small>
            </div>
        </div>

        <p>
            Hoje esta uma bela noite em!
        </p>

        <div class="acoes">
            <span>❤️ 25</span>
            <span>💬 8</span>
        </div>

    </article>

    <article>

        <div class="usuario">
            <img
                class="avatar"
                src="https://www.pngegg.com/pt/png-cufcb"
                alt="Avatar">

            <div>
                <strong>Jardel Santos</strong><br>
                <small>@jardellsts</small>
            </div>
        </div>

        <p>
            Esta Rede social é uma maravilha.
        </p>

        <div class="acoes">
            <span>❤️ 42</span>
            <span>💬 15</span>
        </div>

    </article>

</main>

</body>
</html>
