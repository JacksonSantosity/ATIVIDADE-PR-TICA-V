
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Rede Social</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>

<main class="container">

    <article>
        <h1>Criar Conta</h1>

        <form action="index.html">

            <label for="nome">
                Nome Completo
                <input
                    type="text"
                    id="nome"
                    name="nome"
                    placeholder="Digite seu nome"
                    required>
            </label>

            <label for="username">
                Username
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="@usuario"
                    required>
            </label>

            <label for="email">
                E-mail
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Digite seu e-mail"
                    required>
            </label>

            <label for="senha">
                Senha
                <input
                    type="password"
                    id="senha"
                    name="senha"
                    placeholder="Crie uma senha"
                    required>
            </label>

            <label for="confirmarSenha">
                Confirmar Senha
                <input
                    type="password"
                    id="confirmarSenha"
                    name="confirmarSenha"
                    placeholder="Repita a senha"
                    required>
            </label>

            <button type="submit">
                Cadastrar
            </button>

        </form>

        <p>
            Já possui uma conta?
            <a href="index.html">Fazer login</a>
        </p>

    </article>

</main>

</body>
</html>
